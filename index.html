<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>LEMPAR BOLA • lempar pesan jadi bola</title>
  
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- LOADING SCREEN -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-text">Menyiapkan arena lempar...</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- MAIN APP (hidden until loaded) -->
  <div class="container" id="mainApp" style="display: none;">
    <!-- Sidebar Form -->
    <div class="sidebar">
      <h2>
        <i class="fas fa-basketball-ball"></i> 
        LEMPAR BOLA
      </h2>
      <div class="subtitle">
        <i class="fas fa-paper-plane"></i>
        1 orang = 1 bola, bebas mindahin
      </div>
      
      <div class="form-group">
        <label>
          <i class="fas fa-user-circle"></i>
          NAMA LENGKAP
        </label>
        <input type="text" id="username" placeholder="cth: Si Budi Ganteng" maxlength="30">
        <small class="input-hint">*Nama ini yang akan muncul di bola</small>
      </div>
      
      <div class="form-group">
        <label>
          <i class="fas fa-comment-dots"></i>
          PESAN RAHASIA
        </label>
        <textarea id="message" placeholder="Ada pesan apa hari ini?" maxlength="100"></textarea>
      </div>
      
      <div class="form-group">
        <label>
          <i class="fas fa-palette"></i>
          WARNA BOLA
        </label>
        <div class="color-options" id="colorOptions"></div>
      </div>
      
      <button class="btn-lemper" id="lemperBtn">
        <i class="fas fa-rocket"></i>
        LEMPAR SEKARANG
      </button>
      
      <div class="sidebar-footer">
        <i class="fas fa-info-circle"></i>
        Kamu cuma bisa punya 1 bola. Drag buat mindahin.
      </div>
    </div>
    
    <!-- Area Bola -->
    <div class="bola-area">
      <canvas id="bolaCanvas"></canvas>
      
      <!-- Online Users Counter -->
      <div class="online-users">
        <i class="fas fa-circle online-dot"></i>
        <span id="onlineCount">0</span>
        <span>pemain</span>
      </div>
      
      <!-- Popup container -->
      <div id="popupContainer"></div>
    </div>
  </div>
  
  <!-- Firebase SDK -->
  <script type="import" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script type="import" src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"></script>
  
  <!-- Script kita -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
